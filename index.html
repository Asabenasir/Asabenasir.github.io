<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .form-msg {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
    }

    .success {
      background: #16a34a;
    }

    .error {
      background: #dc2626;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Contact Me</h2>

  <form id="contact-form" action="https://formspree.io/f/xlgkjewe" method="POST">
    
    <!-- Honeypot (anti-spam) -->
    <input type="text" name="_gotcha" style="display:none">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <input type="text" name="subject" placeholder="Subject">
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

    <div id="form-success" class="form-msg success">
      ✅ Message sent successfully!
    </div>

    <div id="form-error" class="form-msg error">
      ❌ Something went wrong. Try again.
    </div>

  </form>
</div>

<script>
const form = document.getElementById('contact-form');
const successMsg = document.getElementById('form-success');
const errorMsg = document.getElementById('form-error');

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  successMsg.style.display = "none";
  errorMsg.style.display = "none";

  const formData = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: form.method,
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    });

    if (response.ok) {
      successMsg.style.display = "block";
      form.reset();
    } else {
      throw new Error("Failed");
    }

  } catch (error) {
    errorMsg.style.display = "block";
  }
});
</script>

</body>
</html>
